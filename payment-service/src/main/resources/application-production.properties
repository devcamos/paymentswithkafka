# Production Configuration
spring.application.name=demo

# Server Configuration
server.port=8081

# Kafka Configuration with Retry and Error Handling
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka Producer Retry Configuration
spring.kafka.producer.retries=3
spring.kafka.producer.retry-backoff-ms=1000
spring.kafka.producer.request-timeout-ms=30000
spring.kafka.producer.delivery-timeout-ms=120000
spring.kafka.producer.enable-idempotence=true
spring.kafka.producer.acks=all

# Kafka Consumer Configuration
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.session-timeout-ms=30000
spring.kafka.consumer.heartbeat-interval-ms=10000
spring.kafka.consumer.max-poll-interval-ms=300000
spring.kafka.consumer.max-poll-records=500

# Topic Configuration
kafka.topic.payments=payments
kafka.topic.payment-events=payment-events

# WebSocket Configuration
spring.websocket.enabled=true

# Logging Configuration
logging.level.com.example.demo=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN

# Error Handling
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.kafka.enabled=true

# Circuit Breaker Configuration (if using Spring Cloud Circuit Breaker)
resilience4j.circuitbreaker.instances.kafka.enabled=true
resilience4j.circuitbreaker.instances.kafka.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafka.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.kafka.sliding-window-size=10
